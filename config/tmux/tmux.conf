# Quality of life
set -g set-clipboard on
set -g renumber-windows on

# Amp CLI compatibility: passthrough graphics, hyperlinks, clipboard, Shift+Enter
set -g allow-passthrough all
set -ga terminal-features ",*:hyperlinks"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -s extended-keys on
bind -n S-Enter send-keys Escape "[13;2u"

# Pi CLI compatibility (quiet for older tmux versions on remote hosts)
set -gq extended-keys-format csi-u

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Better splits, preserving current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Dvorak-native pane navigation: h / t / n / s = left / down / up / right
bind -n M-h select-pane -L
bind -n M-t select-pane -D
bind -n M-n select-pane -U
bind -n M-s select-pane -R

# Resize with Option+Shift+h/t/n/s
bind -n M-H resize-pane -L 5
bind -n M-T resize-pane -D 5
bind -n M-N resize-pane -U 5
bind -n M-S resize-pane -R 5

# Copy mode. tmux-yank handles the platform clipboard command.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Project picker: prefix + p
bind p run-shell "tmux-project-popup"
